services:
  - type: web
    name: coupang-18plus-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 300
    envVars:
      - key: RENDER
        value: "true"
      - key: SCRAPINGBEE_API_KEY
        sync: false   # Set this manually in Render dashboard → Environment
